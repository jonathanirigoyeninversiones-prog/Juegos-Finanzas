<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>RichMan Web - Mi Cartera</title>
    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlbKvvEH2ad0iKKyFAqP8tzqKzPIe1qFk",
            authDomain: "juego-financiero.firebaseapp.com",
            projectId: "juego-financiero",
            storageBucket: "juego-financiero.firebasestorage.app",
            messagingSenderId: "1016511710595",
            appId: "1:1016511710595:web:af94f7572539832e2fa2b6",
            measurementId: "G-87BNF546QY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.fb = { doc, setDoc, getDoc, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged };
    </script>
    <style>
        /* --- CSS COMPLETO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s, color 0.3s;
        }
        
        /* Contenedor de Auth */
        #authScreen { width: 100%; max-width: 400px; background: #121824; padding: 2rem; border-radius: 12px; border: 1px solid #212d3f; text-align: center; }
        #authScreen h2 { color: #f39c12; margin-bottom: 1.5rem; }
        .auth-input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #212d3f; background: #07090e; color: #f0f4f8; font-size: 1rem; }
        .auth-btn { width: 100%; padding: 0.8rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #3498db; color: #fff; font-size: 1rem; transition: 0.2s; }
        .auth-btn:hover { opacity: 0.9; }
        .auth-toggle { margin-top: 1rem; color: #8a9bb8; font-size: 0.9rem; cursor: pointer; text-decoration: underline; }
        #authError { color: #e74c3c; font-size: 0.85rem; margin-top: 0.8rem; }

        #app {
            max-width: 1300px;
            width: 100%;
            display: none;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 16px 16px 0 0;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header {
            background: transparent;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .header-left h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #f5b041, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .header-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 1rem;
        }
        .stats span {
            background: #232d3d;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border-left: 3px solid #f1c40f;
            white-space: nowrap;
        }
        .stats .net-worth {
            border-left-color: #2ecc71;
            font-weight: bold;
        }
        .settings-btn, .logout-btn {
            background: transparent;
            border: none;
            color: #e0e6ed;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            background: #e74c3c;
        }
        .settings-btn { background: transparent; font-size: 1.6rem; }
        .settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a2230;
            border: 1px solid #f1c40f;
            border-radius: 20px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            z-index: 10000;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-panel.active { display: block; }
        .settings-panel h3 { color: #f1c40f; font-size: 1.4rem; margin-bottom: 1.5rem; text-align: center; }
        .settings-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; }
        .settings-overlay.active { display: block; }
        
        .main-tabs {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem 1.5rem;
            background: transparent;
        }
        .main-tabs button {
            background: transparent;
            border: none;
            color: #8d9bb5;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            border-bottom: 3px solid transparent;
        }
        .main-tabs button.active {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
            background: #161c27;
        }
        .section { display: none; }
        .section.active { display: block; }
        .portfolio-section, .history-section {
            background: #10161e;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #2a3442;
        }
        .portfolio-summary, .business-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            margin-bottom: 1.5rem;
            background: #0b0e14;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            flex-direction: column;
        }
        .btn-collect-dividends {
            background: #f39c12;
            color: #0b0e14;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            align-self: flex-start;
            margin-top: 0.2rem;
        }
        .portfolio-table, .market-table, .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .portfolio-table th, .market-table th, .history-table th {
            text-align: left;
            padding: 0.6rem 0.5rem;
            background: #1a2230;
            color: #aab3c5;
        }
        .portfolio-table td, .market-table td, .history-table td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #1e2635;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1a2230;
            border-radius: 24px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            border: 1px solid #f1c40f;
            text-align: center;
        }
        .modal-btn {
            background: #f1c40f;
            color: #0b0e14;
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }
        .business-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .business-card {
            background: #0b0e14;
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid #2a3442;
        }
        .btn-buy, .btn-sell, .btn-upgrade-business {
            padding: 0.4rem 1rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
        }
        .btn-buy { background: #2ecc71; color: #0b0e14; }
        .btn-sell { background: #e74c3c; color: #fff; }
        .btn-upgrade-business { background: #f39c12; color: #0b0e14; }
    </style>
</head>
<body>

    <!-- 🔐 PANTALLA DE ACCESO / REGISTRO -->
    <div id="authScreen">
        <h2 id="authTitle">Iniciar Sesión</h2>
        <input type="email" id="emailInput" class="auth-input" placeholder="Correo electrónico">
        <input type="password" id="passwordInput" class="auth-input" placeholder="Contraseña">
        <button id="authSubmitBtn" class="auth-btn" onclick="handleAuth()">Entrar</button>
        <div class="auth-toggle" onclick="toggleAuthMode()">¿No tienes cuenta? Regístrate aquí</div>
        <div id="authError"></div>
    </div>

<div id="app">

    <div id="stickyHeader">
        <header class="header">
            <div class="header-left">
                <h1 id="gameTitle">Mi Cartera</h1>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span>💰 Efectivo: <strong id="cashDisplay">0</strong></span>
                    <span class="net-worth">🏆 Patrimonio: <strong id="netWorthDisplay">0</strong></span>
                </div>
                <button class="settings-btn" id="settingsToggle">⚙️</button>
                <button class="logout-btn" onclick="logoutUser()">Salir</button>
            </div>
        </header>

        <div class="main-tabs">
            <button class="active" data-section="portfolio">📋 Mi Cartera</button>
            <button data-section="market">📈 Mercado</button>
            <button data-section="business">🏢 Negocios</button>
            <button data-section="history">📜 Historial</button>
        </div>
    </div>

    <section id="portfolioSection" class="section active">
        <div class="portfolio-section">
            <h2>📋 Resumen de Cartera</h2>
            <div class="portfolio-summary" id="portfolioSummary"></div>
            <div id="portfolioTables"></div>
        </div>
    </section>

    <section id="marketSection" class="section">
        <div class="portfolio-section">
            <h2>📈 Mercado</h2>
            <div id="marketTableWrap">
                <table class="market-table">
                    <thead><tr><th>Nombre</th><th>Precio</th><th>Acción</th></tr></thead>
                    <tbody id="marketBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="businessSection" class="section">
        <div class="portfolio-section">
            <h2>🏢 Negocios</h2>
            <div class="business-summary" id="businessSummary"></div>
            <div id="businessList" class="business-list"></div>
        </div>
    </section>

    <section id="historySection" class="section">
        <div class="history-section">
            <h2>📜 Historial de Operaciones</h2>
            <div class="history-table-wrap">
                <table class="history-table">
                    <thead><tr><th>Fecha</th><th>Tipo</th><th>Total</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </section>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div id="modalTitle" style="font-size: 1.3rem; font-weight: bold; color: #f1c40f; margin-bottom: 0.5rem;">Atención</div>
        <div id="modalMessage" style="margin-bottom: 1rem;">Mensaje</div>
        <button class="modal-btn" onclick="hideModal()">Entendido</button>
    </div>
</div>

<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <h3>⚙️ Configuración</h3>
    <button class="modal-btn" style="background:#e74c3c; width:100%;" onclick="resetGameData()">🔄 RESETAR PARTIDA</button>
    <button class="modal-btn" style="width:100%; margin-top:1rem;" onclick="toggleSettings(false)">Cerrar</button>
</div>

<script>
    let isRegistering = false;
    let currentUserUid = null;
    let gameInterval = null;
    let configEmpleosNiveles = [];

    let state = {
        cash: 100,
        title: 'Mi Cartera',
        transactions: [],
        job: { level: 0, active: true },
        businesses: [{ id: 'b1', level: 0 }]
    };

    // Formato exacto de moneda solicitado: XXX.XXX,XX Bs
    function formatNumber(num) {
        const parts = (num || 0).toFixed(2).split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return parts.join(',') + ' Bs';
    }

    function showModal(title, msg) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = msg;
        document.getElementById('modalOverlay').classList.add('active');
    }

    function hideModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    // Cargar la configuración de empleos desde Firebase
    async function loadJobConfigFromFirebase() {
        try {
            const { doc, getDoc } = window.fb;
            const ref = doc(window.db, "configuracion", "empleos");
            const snap = await getDoc(ref);
            if (snap.exists() && snap.data().niveles) {
                configEmpleosNiveles = snap.data().niveles;
            }
        } catch (e) {
            console.error("No se pudo cargar la configuración de empleos:", e);
        }
    }

    // Obtener los datos del nivel actual estrictamente desde Firebase
    function getCurrentJobData() {
        const lvl = state.job.level;
        if (configEmpleosNiveles && configEmpleosNiveles[lvl]) {
            return {
                salary: Number(configEmpleosNiveles[lvl].salario),
                cost: Number(configEmpleosNiveles[lvl].costo)
            };
        }
        if (configEmpleosNiveles.length > 0) {
            const ultimo = configEmpleosNiveles[configEmpleosNiveles.length - 1];
            return { salary: Number(ultimo.salario), cost: Number(ultimo.costo) };
        }
        return { salary: 127.50, cost: 532.40 };
    }

    async function saveUserData() {
        if (!currentUserUid || !window.db) return;
        try {
            const { doc, setDoc } = window.fb;
            await setDoc(doc(window.db, "partidas", currentUserUid), state, { merge: true });
        } catch (e) {
            console.error("Error al guardar en Firebase:", e);
        }
    }

    async function loadUserData(uid) {
        try {
            await loadJobConfigFromFirebase(); 
            const { doc, getDoc, setDoc } = window.fb;
            const userRef = doc(window.db, "partidas", uid);
            const snap = await getDoc(userRef);

            if (snap.exists()) {
                state = { ...state, ...snap.data() };
            } else {
                await setDoc(userRef, state);
            }
            renderAll();
            startLiveJobEarnings();
        } catch (e) {
            console.error("Error al cargar de Firebase:", e);
        }
    }

    function startLiveJobEarnings() {
        if (gameInterval) clearInterval(gameInterval);
        
        gameInterval = setInterval(() => {
            if (currentUserUid && state.job.active) {
                const jobData = getCurrentJobData();
                const grossPerMin = jobData.salary;
                state.cash += grossPerMin;
                
                state.transactions.push({
                    id: Date.now(),
                    type: 'salary',
                    total: grossPerMin,
                    timestamp: new Date().toLocaleString()
                });

                saveUserData();
                renderAll();
            }
        }, 60000); 
    }

    function renderAll() {
        document.getElementById('cashDisplay').textContent = formatNumber(state.cash);
        document.getElementById('netWorthDisplay').textContent = formatNumber(state.cash);
        
        const jobData = getCurrentJobData();
        
        let costToNext = jobData.cost;
        if (configEmpleosNiveles && configEmpleosNiveles[state.job.level + 1]) {
            costToNext = Number(configEmpleosNiveles[state.job.level + 1].costo);
        }

        // Resumen Cartera
        document.getElementById('portfolioSummary').innerHTML = `
            <div>💵 Efectivo: <strong>${formatNumber(state.cash)}</strong></div>
            <div>💼 Empleo: Nivel ${state.job.level} (${formatNumber(jobData.salary)}/min)</div>
            <button class="btn-collect-dividends" onclick="upgradeJob()">📈 Mejorar Empleo (${formatNumber(costToNext)})</button>
        `;

        // Negocios
        const b = state.businesses[0];
        document.getElementById('businessSummary').innerHTML = `<div>Negocio Activo - Nivel: ${b.level}</div>`;
        document.getElementById('businessList').innerHTML = `
            <div class="business-card">
                <h3>Puesto de Limonada</h3>
                <p>Nivel actual: ${b.level}</p>
                <button class="btn-upgrade-business" onclick="upgradeBusiness()">Mejorar</button>
            </div>
        `;

        // Historial
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = state.transactions.slice(-10).reverse().map(tx => `
            <tr><td>${tx.timestamp}</td><td>${tx.type}</td><td>${formatNumber(tx.total)}</td></tr>
        `).join('');
    }

    function upgradeJob() {
        if (!configEmpleosNiveles || !configEmpleosNiveles[state.job.level + 1]) {
            showModal("Límite alcanzado", "Has llegado al nivel máximo de empleo disponible.");
            return;
        }

        const costToUpgrade = Number(configEmpleosNiveles[state.job.level + 1].costo);

        if (state.cash < costToUpgrade) {
            showModal("Fondos insuficientes", "No tienes suficiente efectivo para mejorar el empleo.");
            return;
        }
        state.cash -= costToUpgrade;
        state.job.level += 1;
        saveUserData();
        renderAll();
        showModal("¡Mejora Exitosa!", `Has ascendido a Nivel ${state.job.level}`);
    }

    function upgradeBusiness() {
        const cost = 500 * Math.pow(2, state.businesses[0].level);
        if (state.cash < cost) {
            showModal("Fondos insuficientes", "No tienes suficiente efectivo.");
            return;
        }
        state.cash -= cost;
        state.businesses[0].level += 1;
        saveUserData();
        renderAll();
        showModal("Negocio Mejorado", `Nivel actual: ${state.businesses[0].level}`);
    }

    function resetGameData() {
        if (confirm("¿Seguro que deseas reiniciar tu partida?")) {
            state = { cash: 100, title: 'Mi Cartera', transactions: [], job: { level: 0, active: true }, businesses: [{ id: 'b1', level: 0 }] };
            saveUserData();
            renderAll();
            toggleSettings(false);
        }
    }

    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsOverlay = document.getElementById('settingsOverlay');
    
    function toggleSettings(show) {
        settingsPanel.classList.toggle('active', show);
        settingsOverlay.classList.toggle('active', show);
    }
    settingsToggle.addEventListener('click', () => toggleSettings(true));
    settingsOverlay.addEventListener('click', () => toggleSettings(false));

    document.querySelectorAll('.main-tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.main-tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.section + 'Section').classList.add('active');
        });
    });

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            if (window.fb && window.auth) {
                window.fb.onAuthStateChanged(window.auth, (user) => {
                    if (user) {
                        currentUserUid = user.uid;
                        document.getElementById('authScreen').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        loadUserData(user.uid);
                    } else {
                        currentUserUid = null;
                        if (gameInterval) clearInterval(gameInterval);
                        document.getElementById('authScreen').style.display = 'block';
                        document.getElementById('app').style.display = 'none';
                    }
                });
            }
        }, 500);
    });

    function toggleAuthMode() {
        isRegistering = !isRegistering;
        document.getElementById('authTitle').textContent = isRegistering ? "Crear Cuenta Nueva" : "Iniciar Sesión";
        document.getElementById('authSubmitBtn').textContent = isRegistering ? "Registrarse" : "Entrar";
        document.querySelector('.auth-toggle').textContent = isRegistering ? "¿Ya tienes cuenta? Inicia sesión" : "¿No tienes cuenta? Regístrate aquí";
        document.getElementById('authError').textContent = "";
    }

    async function handleAuth() {
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        const errorDiv = document.getElementById('authError');
        errorDiv.textContent = "";

        if (!email || !password) {
            errorDiv.textContent = "Por favor ingresa correo y contraseña.";
            return;
        }

        try {
            const { createUserWithEmailAndPassword, signInWithEmailAndPassword } = window.fb;
            if (isRegistering) {
                await createUserWithEmailAndPassword(window.auth, email, password);
            } else {
                await signInWithEmailAndPassword(window.auth, email, password);
            }
        } catch (err) {
            errorDiv.textContent = "Error: " + err.message;
        }
    }

    async function logoutUser() {
        try {
            if (gameInterval) clearInterval(gameInterval);
            currentUserUid = null;
            await window.fb.signOut(window.auth);
        } catch (e) {
            console.error(e);
        }
    }
</script>

</body>
</html>
