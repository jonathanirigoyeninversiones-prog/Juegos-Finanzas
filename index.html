<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>vvv RichMan Web - Mi Cartera</title>
    <style>
        /* --- CSS COMPLETO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 16px 16px 0 0;
            margin-bottom: 1.5rem;
            transition: background 0.3s, border-color 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        body.theme-light #stickyHeader {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: #ccc;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            background: transparent;
            padding: 1.5rem;
            border-radius: 16px 16px 0 0;
            margin-bottom: 0;
            border: none;
            box-shadow: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            transition: background 0.3s, border-color 0.3s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #f5b041, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            border: none;
            outline: none;
            padding: 0 5px;
        }
        .header-left .game-title-input {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            background: transparent;
            border: 1px dashed #4a5a72;
            color: #f1c40f;
            padding: 4px 10px;
            border-radius: 8px;
            outline: none;
            width: auto;
            min-width: 150px;
            font-family: inherit;
        }
        .header-left .game-title-input:focus {
            border-color: #f1c40f;
            background: #1e2635;
            color: #fff;
        }
        .header-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 1rem;
        }
        .stats span {
            background: #232d3d;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border-left: 3px solid #f1c40f;
            white-space: nowrap;
            font-size: clamp(0.75rem, 2vw, 1rem);
            transition: background 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .stats .net-worth {
            border-left-color: #2ecc71;
            font-weight: bold;
        }
        .news-status {
            color: #fff;
            font-style: italic;
            background: #e74c3c;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #e74c3c;
            display: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .news-status:hover {
            transform: scale(1.05);
            background: #c0392b;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: #e0e6ed;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 0.5rem;
            transition: transform 0.3s, color 0.3s;
            line-height: 1;
        }
        .settings-btn:hover {
            transform: rotate(60deg);
            color: #f1c40f;
        }
        .settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a2230;
            border: 1px solid #f1c40f;
            border-radius: 20px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            z-index: 10000;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            transition: background 0.3s, border-color 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-panel h3 {
            color: #f1c40f;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .settings-panel .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.1rem;
            color: #aab3c5;
            margin-bottom: 1.5rem;
        }
        .settings-panel .theme-toggle label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #e0e6ed;
        }
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #2a3442;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .switch .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            background: #f1c40f;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .switch.active .slider {
            transform: translateX(24px);
        }
        .switch.active {
            background: #f1c40f;
        }
        .settings-panel .currency-group, .settings-panel .commission-group {
            margin: 1rem 0;
            padding: 0.8rem;
            background: #0b0e14;
            border-radius: 12px;
            border: 1px solid #2a3442;
        }
        .settings-panel .currency-group h4, .settings-panel .commission-group h4 {
            color: #f1c40f;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            text-align: center;
        }
        .settings-panel .currency-group select {
            width: 140px;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #2a3442;
            background: #0b0e14;
            color: #e0e6ed;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }
        .settings-panel .commission-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }
        .settings-panel .commission-row label {
            font-size: 0.9rem;
            color: #aab3c5;
        }
        .settings-panel .commission-row input {
            width: 80px;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #2a3442;
            background: #0b0e14;
            color: #e0e6ed;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }
        .settings-panel .close-settings, .settings-panel .reset-btn, .settings-panel .help-btn {
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            width: 100%;
            font-size: 0.9rem;
        }
        .settings-panel .close-settings { background: #e74c3c; color: #fff; margin-top: 1.5rem; }
        .settings-panel .reset-btn { background: #e74c3c; color: #fff; }
        .settings-panel .help-btn { background: #3498db; color: #fff; }
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            z-index: 9999;
        }
        .settings-overlay.active { display: block; }
        body.theme-light { background: #f0f2f5; color: #1a1a1a; }
        body.theme-light #stickyHeader { background: rgba(255, 255, 255, 0.95); border-bottom-color: #ccc; }
        body.theme-light .stats span { background: #e9ecef; color: #1a1a1a; }
        body.theme-light .settings-panel { background: #ffffff; border-color: #ccc; }
        .main-tabs {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem 1.5rem;
            background: transparent;
        }
        .main-tabs button {
            background: transparent;
            border: none;
            color: #8d9bb5;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            border-bottom: 3px solid transparent;
        }
        .main-tabs button.active {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
            background: #161c27;
        }
        .section { display: none; }
        .section.active { display: block; }
        .portfolio-section, .history-section {
            background: #10161e;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #2a3442;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        body.theme-light .portfolio-section, body.theme-light .history-section { background: #ffffff; border-color: #ccc; }
        .portfolio-summary, .business-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            margin-bottom: 1.5rem;
            background: #0b0e14;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            flex-direction: column;
        }
        body.theme-light .portfolio-summary, body.theme-light .business-summary { background: #f9f9f9; }
        .portfolio-table, .market-table, .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .portfolio-table th, .market-table th, .history-table th {
            text-align: left;
            padding: 0.6rem 0.5rem;
            background: #1a2230;
            color: #aab3c5;
            border-bottom: 2px solid #2a3442;
        }
        .portfolio-table td, .market-table td, .history-table td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #1e2635;
        }
        .btn-buy { background: #2ecc71; color: #0b0e14; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-sell { background: #e74c3c; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: linear-gradient(145deg, #1a2230, #0b0e14);
            border-radius: 24px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            border: 1px solid #f1c40f;
            text-align: center;
        }
        .modal-box .modal-btn {
            background: #f1c40f; color: #0b0e14; border: none; padding: 0.6rem 2rem; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 1rem;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="stickyHeader">
        <header class="header">
            <div class="header-left">
                <h1 id="gameTitle">Mi Cartera</h1>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span>💰 Efectivo: <strong id="cashDisplay">0</strong></span>
                    <span class="net-worth">🏆 Patrimonio: <strong id="netWorthDisplay">0</strong></span>
                </div>
                <button class="settings-btn" id="settingsToggle">⚙️</button>
            </div>
        </header>
        <div class="main-tabs">
            <button class="active" data-section="portfolio">📋 Mi Cartera</button>
            <button data-section="market">📈 Mercado</button>
        </div>
    </div>

    <section id="portfolioSection" class="section active">
        <div class="portfolio-section">
            <h2>📋 Resumen de Cartera</h2>
            <div class="portfolio-summary" id="portfolioSummary"></div>
        </div>
    </section>

    <section id="marketSection" class="section">
        <div class="portfolio-section">
            <h2>📈 Mercado</h2>
            <p>Sección de mercado en desarrollo.</p>
        </div>
    </section>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div id="modalIcon" style="font-size: 2.5rem; margin-bottom: 0.5rem;">⚠️</div>
        <div id="modalTitle" style="font-size: 1.3rem; font-weight: bold; color: #f1c40f; margin-bottom: 0.5rem;">Atención</div>
        <div id="modalMessage" style="margin-bottom: 1rem;">Mensaje</div>
        <button class="modal-btn" id="modalBtn">Entendido</button>
    </div>
</div>

<!-- PANEL DE CONFIGURACIÓN -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <h3>⚙️ Configuración</h3>

    <!-- Copia de seguridad con Telegram integrado -->
    <div class="commission-group" style="border-color: #2ecc71; margin-top: 0.5rem;">
        <h4 style="color:#2ecc71;">💾 Copia de seguridad</h4>
        <div style="display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center;">
            <button id="exportBtn" class="btn-buy" style="padding:0.4rem 1.2rem;">⬆ Exportar</button>
            <button id="importBtn" class="btn-buy" style="padding:0.4rem 1.2rem; background:#3498db; color:#fff;">⬇ Importar</button>
            <button id="exportTelegramBtn" class="btn-buy" style="padding:0.4rem 1.2rem; background:#24a1ee; color:#fff;">📤 Telegram</button>
        </div>
        <div style="font-size:0.75rem; color:#8d9bb5; text-align:center; margin-top:4px;">
            Exporta tu cartera, impórtala o envíala directamente a Telegram.
        </div>
    </div>

    <div class="theme-toggle">
        <label>🌙 Oscuro</label>
        <div class="switch" id="themeSwitch">
            <div class="slider"></div>
        </div>
        <label>☀️ Claro</label>
    </div>

    <div class="currency-group">
        <h4>💱 Moneda</h4>
        <div class="commission-row">
            <label for="currencySelect">Seleccionar</label>
            <select id="currencySelect">
                <option value="VES">Bolívar (VES)</option>
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
            </select>
        </div>
    </div>

    <button class="close-settings" id="closeSettings">Cerrar</button>
</div>

<script>
    (function() {
        "use strict";

        // Estado inicial de la aplicación
        let state = JSON.parse(localStorage.getItem('richman_web_state')) || {
            cash: 1000,
            currency: 'USD',
            assets: []
        };

        function saveState() {
            localStorage.setItem('richman_web_state', JSON.stringify(state));
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
        }

        function renderApp() {
            document.getElementById('cashDisplay').textContent = formatNumber(state.cash);
            document.getElementById('netWorthDisplay').textContent = formatNumber(state.cash);
            
            const summary = document.getElementById('portfolioSummary');
            summary.innerHTML = `<div class="item">💵 Efectivo disponible: <strong>${formatNumber(state.cash)}</strong></div>`;
        }

        // Sistema de Pestañas Principales
        document.querySelectorAll('.main-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.main-tabs button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.section;
                document.getElementById(target + 'Section').classList.add('active');
            });
        });

        // Configuración y Modal
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettingsBtn = document.getElementById('closeSettings');

        function toggleSettings() {
            settingsPanel.classList.toggle('active');
            settingsOverlay.classList.toggle('active');
        }

        settingsToggle.addEventListener('click', toggleSettings);
        settingsOverlay.addEventListener('click', toggleSettings);
        closeSettingsBtn.addEventListener('click', toggleSettings);

        function showModal(icon, title, message) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalOverlay').classList.add('active');
        }

        document.getElementById('modalBtn').addEventListener('click', () => {
            document.getElementById('modalOverlay').classList.remove('active');
        });

        // --- LÓGICA DE EXPORTACIÓN A TELEGRAM ---
        function exportToTelegram() {
            try {
                const stateStr = JSON.stringify(state);
                const mensaje = encodeURIComponent(
                    "🤖 *Copia de seguridad - RichMan Web*\n\n" +
                    "Copia el siguiente código JSON y guárdalo de forma segura:\n\n`" + stateStr + "`"
                );
                const telegramUrl = `https://t.me/share/url?url=&text=${mensaje}`;
                window.open(telegramUrl, '_blank');
            } catch (e) {
                showModal('❌', 'Error', 'No se pudo generar el respaldo para Telegram: ' + e.message);
            }
        }

        document.getElementById('exportTelegramBtn').addEventListener('click', exportToTelegram);

        // Inicializar interfaz
        renderApp();
    })();
</script>
</body>
</html>
