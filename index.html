<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>RichMan Web - Mi Cartera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 16px 16px 0 0;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header {
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .header-left h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #f5b041, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 1rem;
        }
        .stats span {
            background: #232d3d;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border-left: 3px solid #f1c40f;
            white-space: nowrap;
        }
        .stats .net-worth {
            border-left-color: #2ecc71;
            font-weight: bold;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: #e0e6ed;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 0.5rem;
        }
        .main-tabs {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem 1.5rem;
            overflow-x: auto;
        }
        .main-tabs button {
            background: transparent;
            border: none;
            color: #8d9bb5;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }
        .main-tabs button.active {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
            background: #161c27;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .portfolio-section, .history-section {
            background: #10161e;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #2a3442;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .portfolio-summary, .business-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            margin-bottom: 1.5rem;
            background: #0b0e14;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
        }
        .portfolio-table, .market-table, .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        .portfolio-table th, .portfolio-table td,
        .market-table th, .market-table td,
        .history-table th, .history-table td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #1e2635;
            text-align: left;
        }
        .portfolio-table th, .market-table th, .history-table th {
            background: #1a2230;
            color: #aab3c5;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tabs button, .business-search .filter-btns button {
            background: #1e2635;
            border: none;
            color: #aab3c5;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .tabs button.active, .business-search .filter-btns button.active {
            background: #f1c40f;
            color: #0b0e14;
        }
        .business-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .business-card {
            background: #0b0e14;
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid #2a3442;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .business-card.owned {
            border-color: #f1c40f;
        }
        .business-card button {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-buy { background: #2ecc71; color: #0b0e14; }
        .btn-upgrade { background: #f39c12; color: #0b0e14; }
        .btn-sell { background: #e74c3c; color: #fff; }
        .empty-msg {
            text-align: center;
            padding: 2rem;
            color: #5a6a82;
            font-size: 1.1rem;
        }
        .modal-overlay, .settings-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active, .settings-overlay.active { display: flex; }
        .settings-panel {
            background: #1a2230;
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid #f1c40f;
            max-width: 450px;
            width: 90%;
            color: #fff;
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
        }
        .settings-panel.active { display: block; }
    </style>
</head>
<body>
<div id="app">
    <div id="stickyHeader">
        <header class="header">
            <div class="header-left">
                <h1>Mi Cartera</h1>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span>💰 Efectivo: <strong id="cashDisplay">0</strong></span>
                    <span class="net-worth">🏆 Patrimonio: <strong id="netWorthDisplay">0</strong></span>
                </div>
                <button class="settings-btn" id="settingsToggle">⚙️</button>
            </div>
        </header>
        <div class="main-tabs">
            <button class="active" data-section="portfolio">📋 Mi Cartera</button>
            <button data-section="market">📈 Mercado</button>
            <button data-section="credit">💳 Crédito</button>
            <button data-section="business">🏢 Negocios</button>
            <button data-section="history">📜 Historial</button>
        </div>
    </div>

    <!-- SECCIÓN CARTERA -->
    <section id="portfolioSection" class="section active">
        <div class="portfolio-section">
            <h2>📋 Resumen de Cartera</h2>
            <div class="portfolio-summary" id="portfolioSummary"></div>
            <div id="portfolioTables"></div>
        </div>
    </section>

    <!-- SECCIÓN MERCADO -->
    <section id="marketSection" class="section">
        <div class="portfolio-section">
            <h2>📈 Mercado</h2>
            <div class="tabs" id="marketTabs">
                <button class="active" data-filter="stock">📊 Acciones</button>
                <button data-filter="crypto">🪙 Criptos</button>
            </div>
            <div class="market-table-wrap">
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>Activo</th>
                            <th>Precio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="marketBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- SECCIÓN CRÉDITO -->
    <section id="creditSection" class="section">
        <div class="portfolio-section">
            <h2>💳 Crédito</h2>
            <p>Módulo de préstamos y margen disponible.</p>
        </div>
    </section>

    <!-- SECCIÓN NEGOCIOS -->
    <section id="businessSection" class="section">
        <div class="portfolio-section">
            <h2>🏢 Negocios</h2>
            <div class="business-summary" id="businessSummary"></div>
            <div id="businessList" class="business-list"></div>
        </div>
    </section>

    <!-- SECCIÓN HISTORIAL -->
    <section id="historySection" class="section">
        <div class="history-section">
            <h2>📜 Historial</h2>
            <div id="historyBody" class="empty-msg">Sin operaciones registradas aún.</div>
        </div>
    </section>
</div>

<!-- CONFIGURACIÓN -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <h3>⚙️ Configuración</h3>
    <button id="closeSettings" style="margin-top:1rem; padding:0.5rem 1rem; background:#e74c3c; border:none; color:#fff; border-radius:8px; cursor:pointer;">Cerrar</button>
</div>

<script>
    (function() {
        "use strict";

        const DEFAULT_ASSETS = [
            { id: 'btc', name: 'Bitcoin', symbol: 'BTC', type: 'crypto', price: 45000, owned: 0, costBasis: 0 },
            { id: 'eth', name: 'Ethereum', symbol: 'ETH', type: 'crypto', price: 3000, owned: 0, costBasis: 0 },
            { id: 'sol', name: 'Solana', symbol: 'SOL', type: 'crypto', price: 120, owned: 0, costBasis: 0 },
            { id: 'aapl', name: 'Apple', symbol: 'AAPL', type: 'stock', price: 175, owned: 0, costBasis: 0, exchange: 'NASDAQ' },
            { id: 'msft', name: 'Microsoft', symbol: 'MSFT', type: 'stock', price: 410, owned: 0, costBasis: 0, exchange: 'NASDAQ' }
        ];

        const BUSINESSES = [
            { id: 'b1', name: 'Puesto de limonada', costBase: 500, incomeBase: 0.05 },
            { id: 'b2', name: 'Máquina de snacks', costBase: 1200, incomeBase: 0.12 },
            { id: 'b3', name: 'Lavandería automática', costBase: 5000, incomeBase: 0.50 },
            { id: 'b4', name: 'Tienda de barrio', costBase: 15000, incomeBase: 1.50 },
            { id: 'b5', name: 'Gimnasio', costBase: 35000, incomeBase: 3.50 }
        ];

        let state = JSON.parse(localStorage.getItem('richman_web_state')) || {
            cash: 10000,
            assets: DEFAULT_ASSETS,
            businesses: BUSINESSES.map(b => ({ id: b.id, level: 0 })),
            transactions: []
        };

        function saveState() {
            localStorage.setItem('richman_web_state', JSON.stringify(state));
        }

        // Navegación
        const tabButtons = document.querySelectorAll('.main-tabs button');
        const sections = document.querySelectorAll('.section');

        tabButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                tabButtons.forEach(b => b.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.section + 'Section').classList.add('active');
                render();
            });
        });

        // Configuración panel
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettings = document.getElementById('closeSettings');

        settingsToggle.addEventListener('click', () => { settingsPanel.classList.add('active'); settingsOverlay.classList.add('active'); });
        closeSettings.addEventListener('click', () => { settingsPanel.classList.remove('active'); settingsOverlay.classList.remove('active'); });
        settingsOverlay.addEventListener('click', () => { settingsPanel.classList.remove('active'); settingsOverlay.classList.remove('active'); });

        let marketFilter = 'stock';
        document.querySelectorAll('#marketTabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#marketTabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                marketFilter = this.dataset.filter;
                renderMarket();
            });
        });

        window.buyAsset = function(id) {
            const asset = state.assets.find(a => a.id === id);
            if (!asset || state.cash < asset.price) return alert('Efectivo insuficiente');
            state.cash -= asset.price;
            asset.owned += 1;
            asset.costBasis += asset.price;
            saveState();
            render();
        };

        window.sellAsset = function(id) {
            const asset = state.assets.find(a => a.id === id);
            if (!asset || asset.owned <= 0) return alert('No posees este activo');
            state.cash += asset.price;
            asset.owned -= 1;
            asset.costBasis -= asset.price;
            saveState();
            render();
        };

        window.buyBusiness = function(id) {
            const b = BUSINESSES.find(x => x.id === id);
            const entry = state.businesses.find(x => x.id === id);
            if (entry.level > 0 || state.cash < b.costBase) return alert('Fondos insuficientes o ya comprado');
            state.cash -= b.costBase;
            entry.level = 1;
            saveState();
            render();
        };

        function render() {
            document.getElementById('cashDisplay').textContent = state.cash.toLocaleString() + ' $';
            let netWorth = state.cash;
            state.assets.forEach(a => { netWorth += a.price * a.owned; });
            document.getElementById('netWorthDisplay').textContent = netWorth.toLocaleString() + ' $';

            // Cartera
            const portfolioDiv = document.getElementById('portfolioTables');
            const ownedAssets = state.assets.filter(a => a.owned > 0);
            if (ownedAssets.length === 0) {
                portfolioDiv.innerHTML = '<div class="empty-msg">No tienes posiciones abiertas. Compra en el Mercado.</div>';
            } else {
                let html = '<table class="portfolio-table"><thead><tr><th>Activo</th><th>Cantidad</th><th>Valor Actual</th><th>Acción</th></tr></thead><tbody>';
                ownedAssets.forEach(a => {
                    html += `<tr><td>${a.name} (${a.symbol})</td><td>${a.owned}</td><td>${(a.price * a.owned).toLocaleString()} $</td><td><button class="btn-sell" onclick="sellAsset('${a.id}')">Vender</button></td></tr>`;
                });
                html += '</tbody></table>';
                portfolioDiv.innerHTML = html;
            }

            renderMarket();
            renderBusiness();
        }

        function renderMarket() {
            const body = document.getElementById('marketBody');
            const filtered = state.assets.filter(a => a.type === marketFilter);
            let html = '';
            filtered.forEach(a => {
                html += `<tr><td><strong>${a.symbol}</strong> - ${a.name}</td><td>${a.price.toLocaleString()} $</td><td><button class="btn-buy" onclick="buyAsset('${a.id}')">Comprar</button></td></tr>`;
            });
            body.innerHTML = html;
        }

        function renderBusiness() {
            const list = document.getElementById('businessList');
            const summary = document.getElementById('businessSummary');
            let ownedCount = state.businesses.filter(b => b.level > 0).length;
            summary.innerHTML = `<div>Negocios propios: <strong>${ownedCount}</strong></div>`;

            let html = '';
            BUSINESSES.forEach(b => {
                const entry = state.businesses.find(x => x.id === b.id);
                const owned = entry.level > 0;
                html += `
                    <div class="business-card ${owned ? 'owned' : ''}">
                        <strong>${b.name}</strong>
                        <span>Costo: ${b.costBase.toLocaleString()} $</span>
                        <span>Estado: ${owned ? 'Nivel ' + entry.level : 'Disponible'}</span>
                        ${!owned ? `<button class="btn-buy" onclick="buyBusiness('${b.id}')">Comprar</button>` : '<span>Adquirido</span>'}
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        render();
    })();
</script>
</body>
</html>
