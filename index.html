<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>RichMan Web - Mi Cartera</title>
    <!-- Configuración e inicialización de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlbKvvEH2ad0iKKyFAqP8tzqKzPIe1qFk",
            authDomain: "juego-financiero.firebaseapp.com",
            projectId: "juego-financiero",
            storageBucket: "juego-financiero.firebasestorage.app",
            messagingSenderId: "1016511710595",
            appId: "1:1016511710595:web:af94f7572539832e2fa2b6",
            measurementId: "G-87BNF546QY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.firebaseModules = { doc, setDoc, getDoc };
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
        body { background: #0b0e14; color: #e0e6ed; padding: 2vw; min-height: 100vh; display: flex; justify-content: center; }
        #app { max-width: 1300px; width: 100%; }
        header { background: #161c27; padding: 1.5rem; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border: 1px solid #2a3442; }
        h1 { color: #f1c40f; font-size: 1.8rem; }
        .stats { display: flex; gap: 1rem; font-size: 1rem; }
        .stats span { background: #232d3d; padding: 0.4rem 1rem; border-radius: 30px; border-left: 3px solid #f1c40f; }
        .section { background: #10161e; border-radius: 20px; padding: 1.5rem; border: 1px solid #2a3442; margin-bottom: 1.5rem; }
        h2 { color: #f1c40f; margin-bottom: 1rem; }
        .business-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .business-card { background: #0b0e14; border-radius: 12px; padding: 1rem; border: 1px solid #2a3442; display: flex; flex-direction: column; gap: 0.5rem; }
        .business-card.owned { border-color: #f1c40f; }
        button { padding: 0.5rem 1rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; background: #3498db; color: #fff; transition: 0.15s; }
        button:hover { background: #2980b9; }
        .btn-buy { background: #2ecc71; color: #0b0e14; }
        .btn-buy:hover { background: #27ae60; }
        #cloudStatus { font-size: 0.85rem; color: #2ecc71; margin-top: 0.5rem; text-align: right; }
    </style>
</head>
<body>
<div id="app">
    <header>
        <h1>RichMan Web - Sincronizado</h1>
        <div class="stats">
            <span>💰 Efectivo: <strong id="cashDisplay">0,00 Bs</strong></span>
            <span>🏢 Negocios Propios: <strong id="ownedCount">0</strong></span>
        </div>
    </header>

    <div id="cloudStatus">Conectando a Firebase...</div>

    <section class="section">
        <h2>🏢 Panel de Negocios y Avances</h2>
        <div id="businessList" class="business-list"></div>
    </section>
</div>

<script>
    (function() {
        "use strict";

        const BUSINESSES = [
            { id: 'b1', name: 'Puesto de limonada', cost: 500, income: 5 },
            { id: 'b2', name: 'Máquina de snacks', cost: 1200, income: 12 },
            { id: 'b3', name: 'Cultivo de hierbas', cost: 2000, income: 20 },
            { id: 'b4', name: 'Estacionamiento', cost: 3500, income: 35 }
        ];

        let state = {
            cash: 1000,
            businesses: []
        };

        function getUserId() {
            let userId = localStorage.getItem('richman_user_id');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('richman_user_id', userId);
            }
            return userId;
        }

        async function saveState() {
            try {
                localStorage.setItem('richman_state', JSON.stringify(state));
                if (window.db && window.firebaseModules) {
                    const { doc, setDoc } = window.firebaseModules;
                    const userId = getUserId();
                    await setDoc(doc(window.db, "partidas", userId), state);
                    document.getElementById('cloudStatus').textContent = "☁️ Sincronizado en la nube";
                }
            } catch (e) {
                console.error("Error al guardar en Firebase:", e);
                document.getElementById('cloudStatus').textContent = "⚠️ Error de sincronización (guardado local)";
            }
        }

        async function loadState() {
            try {
                if (window.db && window.firebaseModules) {
                    const { doc, getDoc } = window.firebaseModules;
                    const userId = getUserId();
                    const docSnap = await getDoc(doc(window.db, "partidas", userId));
                    if (docSnap.exists()) {
                        document.getElementById('cloudStatus').textContent = "☁️ Datos cargados desde Firebase";
                        return docSnap.data();
                    }
                }
            } catch (e) {
                console.error("Error al cargar de Firebase:", e);
            }

            const local = localStorage.getItem('richman_state');
            if (local) {
                document.getElementById('cloudStatus').textContent = "💾 Usando datos locales";
                return JSON.parse(local);
            }
            return null;
        }

        function formatMoney(num) {
            return num.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Bs';
        }

        function render() {
            document.getElementById('cashDisplay').textContent = formatMoney(state.cash);
            const owned = state.businesses.filter(b => b.owned).length;
            document.getElementById('ownedCount').textContent = owned;

            const container = document.getElementById('businessList');
            let html = '';

            BUSINESSES.forEach(b => {
                const userBiz = state.businesses.find(item => item.id === b.id) || { owned: false, level: 0 };
                html += `
                    <div class="business-card ${userBiz.owned ? 'owned' : ''}">
                        <strong>${b.name}</strong>
                        <span>Costo: ${formatMoney(b.cost)}</span>
                        <span>Ingreso: ${formatMoney(b.income)} / min</span>
                        <div style="margin-top:auto;">
                            ${!userBiz.owned ? `<button class="btn-buy" data-id="${b.id}">Comprar</button>` : `<span style="color:#2ecc71; font-weight:bold;">¡Adquirido!</span>`}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            container.querySelectorAll('.btn-buy').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const biz = BUSINESSES.find(b => b.id === id);
                    if (state.cash >= biz.cost) {
                        state.cash -= biz.cost;
                        let userBiz = state.businesses.find(item => item.id === id);
                        if (userBiz) {
                            userBiz.owned = true;
                        } else {
                            state.businesses.push({ id: id, owned: true, level: 1 });
                        }
                        saveState();
                        render();
                    } else {
                        alert("Efectivo insuficiente");
                    }
                });
            });
        }

        async function init() {
            const cloudState = await loadState();
            if (cloudState) {
                state = cloudState;
            }
            render();

            // Generar ingresos pasivos cada minuto y guardar en la nube
            setInterval(() => {
                let totalIncome = 0;
                state.businesses.forEach(b => {
                    if (b.owned) {
                        const original = BUSINESSES.find(item => item.id === b.id);
                        if (original) totalIncome += original.income;
                    }
                });
                if (totalIncome > 0) {
                    state.cash += totalIncome;
                    saveState();
                    render();
                }
            }, 60000);
        }

        init();
    })();
</script>
</body>
</html>
