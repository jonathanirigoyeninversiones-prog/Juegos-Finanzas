<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>vvv RichMan Web - Configuración y Mercado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scroll-behavior: smooth;
        }
        .nav-button {
            background: #161c27;
            color: #94a3b8;
            border: 1px solid #2a3442;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .nav-button:hover, .nav-button.active {
            background: #1f293d;
            color: #ffffff;
            border-color: #3b82f6;
        }
        .market-table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 10px;
        }
        table.market-optimized-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            text-align: left;
        }
        table.market-optimized-table th, 
        table.market-optimized-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #1f293d;
            white-space: nowrap;
        }
        table.market-optimized-table th {
            background-color: #161c27;
            color: #94a3b8;
            font-weight: 600;
        }
        /* --- INICIO DE OPTIMIZACIÓN PASO 3: Selector de Moneda Validado --- */
        .config-section {
            background: #161c27;
            border: 1px solid #2a3442;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .config-section h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #3b82f6;
        }
        .currency-selector-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .currency-select {
            background: #0b0e14;
            color: #e0e6ed;
            border: 1px solid #2a3442;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }
        .currency-select:focus {
            border-color: #3b82f6;
        }
        /* --- FIN DE OPTIMIZACIÓN PASO 3 --- */
    </style>
</head>
<body>
    <div id="app">
        <header id="stickyHeader">
            <h1>RichMan Web</h1>
            <nav class="nav-menu">
                <button class="nav-button active" onclick="switchTab('cartera')">📋 Mi Cartera</button>
                <button class="nav-button" onclick="switchTab('mercado')">📈 Mercado</button>
                <button class="nav-button" onclick="switchTab('credito')">💳 Crédito</button>
                <button class="nav-button" onclick="switchTab('negocios')">🏢 Negocios</button>
                <button class="nav-button" onclick="switchTab('config')">⚙ Configuración</button>
            </nav>
        </header>
        <main>
            <section id="mercadoSection" class="game-section">
                <h2>📈 Mercado</h2>
                <div class="market-table-container">
                    <table class="market-optimized-table">
                        <thead>
                            <tr>
                                <th>Activo</th>
                                <th>Precio</th>
                                <th>Variación</th>
                                <th>Div</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>ⓘ ☆ ANZ (ASX)</td>
                                <td>93,90 Bs</td>
                                <td style="color: #10b981;">▲ 0.03%</td>
                                <td>0.97%</td>
                                <td>1 Costo: 93,90 Bs</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="configSection" class="config-section" style="display:none;">
                <h3>⚙ Configuración General</h3>
                <div class="currency-selector-container">
                    <label for="monedaSelect">💱 Seleccionar Moneda:</label>
                    <select id="monedaSelect" class="currency-select">
                        <option value="AED">Dirham (AED)</option>
                        <option value="ARS">Peso argentino (ARS)</option>
                        <option value="AUD">Dólar australiano (AUD)</option>
                        <option value="BRL">Real (BRL)</option>
                        <option value="EUR">Euro (EUR)</option>
                        <option value="GBP">Libra (GBP)</option>
                        <option value="MXN">Peso mexicano (MXN)</option>
                        <option value="USD" selected>Dólar / Bolivar Estándar (Bs)</option>
                    </select>
                </div>
            </section>
        </main>
    </div>
    <script>
        // Lógica de navegación y estabilidad intacta
        function switchTab(tabName) {
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('mercadoSection').style.display = 'none';
            document.getElementById('configSection').style.display = 'none';

            if(tabName === 'mercado') {
                document.getElementById('mercadoSection').style.display = 'block';
            } else if(tabName === 'config') {
                document.getElementById('configSection').style.display = 'block';
            }
        }
        (function() {
            console.log("RichMan Web: Módulos de optimización cargados exitosamente.");
        })();
    </script>
</body>
</html>
