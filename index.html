<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>RichMan Web - Mi Cartera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* --- INICIO DE OPTIMIZACIÓN PASO 2: Fluidez del menú de navegación superior --- */
        .nav-menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scroll-behavior: smooth;
        }
        .nav-button {
            background: #161c27;
            color: #94a3b8;
            border: 1px solid #2a3442;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            will-change: transform;
        }
        .nav-button:hover, .nav-button.active {
            background: #1f293d;
            color: #ffffff;
            border-color: #3b82f6;
        }
        /* --- FIN DE OPTIMIZACIÓN PASO 2 --- */
    </style>
</head>
<body>
    <div id="app">
        <header id="stickyHeader">
            <h1>RichMan Web</h1>
            <nav class="nav-menu">
                <button class="nav-button active">📋 Mi Cartera</button>
                <button class="nav-button">📈 Mercado</button>
                <button class="nav-button">💳 Crédito</button>
                <button class="nav-button">🏢 Negocios</button>
                <button class="nav-button">📜 Historial</button>
            </nav>
        </header>
        <main>
            <section id="contentSection">
                <p>Contenido principal del sistema activo.</p>
            </section>
        </main>
    </div>
    <script>
        (function() {
            const buttons = document.querySelectorAll('.nav-button');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        })();
    </script>
</body>
</html>
