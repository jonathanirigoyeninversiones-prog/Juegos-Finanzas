<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zz Juego Financiero</title>

    <!-- 1. Configuración e inicialización de Firebase -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAlbKvvEH2ad0iKKyFAqP8tzqKzPIe1qFk",
        authDomain: "juego-financiero.firebaseapp.com",
        projectId: "juego-financiero",
        storageBucket: "juego-financiero.firebasestorage.app",
        messagingSenderId: "1016511710595",
        appId: "1:1016511710595:web:af94f7572539832e2fa2b6",
        measurementId: "G-87BNF546QY"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.db = db;
      window.firebaseModules = { doc, setDoc, getDoc };
    </script>
</head>
<body>

    <!-- Contenido visual de tu juego va aquí -->
    <div id="app">
        <h1>Juego Financiero</h1>
        <p>Estado de la nube: <span id="status-nube">Conectando...</span></p>
    </div>

    <!-- 2. Funciones de sincronización y lógica del juego -->
    <script>
        function getUserId() {
            let userId = localStorage.getItem('juego_user_id');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('juego_user_id', userId);
            }
            return userId;
        }

        async function saveStateToCloud(currentState) {
            try {
                localStorage.setItem('juego_state_backup', JSON.stringify(currentState));

                if (window.db && window.firebaseModules) {
                    const { doc, setDoc } = window.firebaseModules;
                    const userId = getUserId();
                    await setDoc(doc(window.db, "partidas", userId), currentState);
                    document.getElementById('status-nube').innerText = "Sincronizado con la nube";
                }
            } catch (e) {
                console.error("Error al guardar en la nube:", e);
                document.getElementById('status-nube').innerText = "Error de sincronización";
            }
        }

        async function loadStateFromCloud() {
            try {
                if (window.db && window.firebaseModules) {
                    const { doc, getDoc } = window.firebaseModules;
                    const userId = getUserId();
                    const docRef = doc(window.db, "partidas", userId);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        document.getElementById('status-nube').innerText = "Datos cargados de la nube";
                        return docSnap.data();
                    }
                }
            } catch (e) {
                console.error("Error al cargar de la nube:", e);
            }

            const localBackup = localStorage.getItem('juego_state_backup');
            if (localBackup) {
                document.getElementById('status-nube').innerText = "Usando respaldo local";
                return JSON.parse(localBackup);
            }

            document.getElementById('status-nube').innerText = "Nueva partida";
            return null;
        }

        // Ejemplo de inicialización automática al cargar la página
        window.addEventListener('DOMContentLoaded', async () => {
            let state = await loadStateFromCloud();
            if (!state) {
                state = { dinero: 1000, negocios: [] }; // Estado inicial por defecto
                await saveStateToCloud(state);
            }
        });
    </script>
</body>
</html>
