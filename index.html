<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Man - Juegos de Finanzas</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.25;
        }
        header {
            background-color: var(--card-bg);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 22px;
            color: var(--accent);
        }
        nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background-color: #334155;
            color: var(--text-color);
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .nav-btn:hover {
            background-color: #475569;
        }
        /* Jerarquía visual clara para indicar el módulo activo */
        .nav-btn.active {
            background-color: #0284c7;
            font-weight: bold;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        main {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        h2 {
            font-size: 18px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        th {
            background-color: #111827;
            color: var(--text-muted);
        }
        .config-section {
            margin-top: 25px;
        }
        select {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-size: 14px;
            background-color: #0f172a;
            color: var(--text-color);
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <header>
        <h1>RichMan Web</h1>
        <nav>
            <a href="#" class="nav-btn">📋 Mi Cartera</a>
            <a href="#" class="nav-btn active">📈 Mercado</a>
            <a href="#" class="nav-btn">💳 Crédito</a>
            <a href="#" class="nav-btn">🏢 Negocios</a>
            <a href="#" class="nav-btn">⚙ Configuración</a>
        </nav>
    </header>

    <main>
        <section id="mercado-section">
            <h2>📈 Mercado</h2>
            <table>
                <thead>
                    <tr>
                        <th>Activo</th>
                        <th>Precio</th>
                        <th>Variación</th>
                        <th>Div</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>ⓘ ☆ ANZ (ASX)</td>
                        <td>93,90 Bs</td>
                        <td>▲ 0.03%</td>
                        <td>0.97%</td>
                        <td>1 Costo: 93,90 Bs</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="config-section">
            <h2>⚙ Configuración General</h2>
            <label for="moneda-select">💱 Seleccionar Moneda:</label><br><br>
            <select id="moneda-select">
                <option value="Bs">Dólar / Bolívar Estándar (Bs)</option>
            </select>
        </section>
    </main>

</body>
</html>
