<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cc Juego Financiero</title>
    <style>
        :root {
            --bg-main: #07090e;
            --bg-card: #121824;
            --bg-header: #0d121c;
            --border-color: #212d3f;
            --accent-gold: #f39c12;
            --text-main: #f0f4f8;
            --text-muted: #8a9bb8;
            --success: #2ecc71;
            --danger: #e74c3c;
            --primary: #3498db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; }
        #app { max-width: 1200px; width: 100%; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-header); padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 1.5rem; }
        .top-bar h1 { color: var(--accent-gold); font-size: 1.5rem; }
        .badge { background: var(--bg-card); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; color: var(--accent-gold); }

        .main-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .main-tabs button { background: var(--bg-header); border: 1px solid var(--border-color); color: var(--text-muted); padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .main-tabs button.active { color: var(--accent-gold); background: var(--bg-card); border-color: var(--accent-gold); }

        .section { display: none; background: var(--bg-card); border-radius: 12px; padding: 2rem; border: 1px solid var(--border-color); }
        .section.active { display: block; }
        h2 { color: var(--accent-gold); margin-bottom: 1.5rem; font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }

        .portfolio-card { display: flex; flex-direction: column; gap: 1rem; }
        .portfolio-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.05rem; color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding-bottom: 0.8rem; }
        .portfolio-row strong { color: var(--text-main); font-size: 1.1rem; }

        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
    </style>
</head>
<body>

<div id="app">
    <div class="top-bar">
        <h1>Simulador Financiero</h1>
        <div class="badge">Efectivo: <span id="topCashDisplay">100,00 Bs</span></div>
    </div>

    <div class="main-tabs">
        <button class="active" onclick="switchTab('portfolio')">📋 Cartera</button>
        <button onclick="switchTab('market')">📈 Mercado</button>
    </div>

    <!-- SECCIÓN CARTERA -->
    <section id="portfolio" class="section active">
        <h2>📋 Resumen de Cartera</h2>
        <div class="portfolio-card">
            <div class="portfolio-row">💵 Efectivo: <strong id="cashVal">100,00 Bs</strong></div>
            <div class="portfolio-row">📊 Capital invertido: <strong id="investedVal">0,00 Bs</strong></div>
            <div class="portfolio-row">📈 Valor actual: <strong id="valueVal">0,00 Bs</strong></div>
            <div class="portfolio-row">📉 G/P no realizada: <strong id="gpVal" class="text-green">+0,00 Bs</strong></div>
            <div class="portfolio-row">💼 Empleo: <strong id="jobVal">Nivel 1 (100,00 Bs)</strong></div>
        </div>
    </section>

    <!-- SECCIÓN MERCADO -->
    <section id="market" class="section">
        <h2>📈 Mercado de Acciones</h2>
        <p>Espacio reservado para los activos.</p>
    </section>
</div>

<script>
    // Función para dar formato numérico XXX.XXX,XX
    function formatMoney(amount) {
        return amount.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Bs';
    }

    // Control sencillo de pestañas
    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.main-tabs button').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }
</script>

</body>
</html>
