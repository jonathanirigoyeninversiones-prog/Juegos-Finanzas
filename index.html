<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>RichMan Web - Mi Cartera</title>
    <style>
        /* --- CSS COMPLETO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 16px 16px 0 0;
            margin-bottom: 1.5rem;
            transition: background 0.3s, border-color 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        body.theme-light #stickyHeader {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: #ccc;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            background: transparent;
            padding: 1.5rem;
            border-radius: 16px 16px 0 0;
            margin-bottom: 0;
            border: none;
            box-shadow: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            transition: background 0.3s, border-color 0.3s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #f5b041, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            border: none;
            outline: none;
            padding: 0 5px;
        }
        .header-left .game-title-input {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            background: transparent;
            border: 1px dashed #4a5a72;
            color: #f1c40f;
            padding: 4px 10px;
            border-radius: 8px;
            outline: none;
            width: auto;
            min-width: 150px;
            font-family: inherit;
        }
        .header-left .game-title-input:focus {
            border-color: #f1c40f;
            background: #1e2635;
            color: #fff;
        }
        .header-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 1rem;
        }
        .stats span {
            background: #232d3d;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border-left: 3px solid #f1c40f;
            white-space: nowrap;
            font-size: clamp(0.75rem, 2vw, 1rem);
            transition: background 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .stats .net-worth {
            border-left-color: #2ecc71;
            font-weight: bold;
        }
        .news-status {
            color: #fff;
            font-style: italic;
            background: #e74c3c;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #e74c3c;
            display: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .news-status:hover {
            transform: scale(1.05);
            background: #c0392b;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: #e0e6ed;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 0.5rem;
            transition: transform 0.3s, color 0.3s;
            line-height: 1;
        }
        .settings-btn:hover {
            transform: rotate(60deg);
            color: #f1c40f;
        }
        .settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a2230;
            border: 1px solid #f1c40f;
            border-radius: 20px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            z-index: 10000;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-panel h3 {
            color: #f1c40f;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .settings-panel .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.1rem;
            color: #aab3c5;
            margin-bottom: 1.5rem;
        }
        .settings-panel .theme-toggle label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #e0e6ed;
        }
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #2a3442;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .switch .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            background: #f1c40f;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .switch.active .slider {
            transform: translateX(24px);
        }
        .switch.active {
            background: #f1c40f;
        }
        .settings-panel .currency-group, .settings-panel .commission-group {
            margin: 1rem 0;
            padding: 0.8rem;
            background: #0b0e14;
            border-radius: 12px;
            border: 1px solid #2a3442;
        }
        .settings-panel .currency-group h4, .settings-panel .commission-group h4 {
            color: #f1c40f;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            text-align: center;
        }
        .settings-panel .currency-group select {
            width: 140px;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #2a3442;
            background: #0b0e14;
            color: #e0e6ed;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }
        .settings-panel .currency-group select:focus {
            border-color: #f1c40f;
        }
        .settings-panel .currency-group .format-hint {
            font-size: 0.8rem;
            color: #8d9bb5;
        }
        .settings-panel .commission-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }
        .settings-panel .commission-row label {
            font-size: 0.9rem;
            color: #aab3c5;
            min-width: 70px;
        }
        .settings-panel .commission-row input {
            width: 80px;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #2a3442;
            background: #0b0e14;
            color: #e0e6ed;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }
        .settings-panel .commission-row input:focus {
            border-color: #f1c40f;
        }
        .settings-panel .commission-row span {
            font-size: 0.8rem;
            color: #8d9bb5;
            min-width: 20px;
        }
        .settings-panel .close-settings {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 0.4rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .settings-panel .close-settings:hover {
            background: #c0392b;
        }
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            z-index: 9999;
        }
        .settings-overlay.active {
            display: block;
        }
        body.theme-light {
            background: #f0f2f5;
            color: #1a1a1a;
        }
        body.theme-light #stickyHeader {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: #ccc;
        }
        body.theme-light .stats span {
            background: #e9ecef;
            color: #1a1a1a;
        }
        body.theme-light .stats .net-worth {
            border-left-color: #2ecc71;
        }
        body.theme-light .settings-panel {
            background: #ffffff;
            border-color: #ccc;
        }
        body.theme-light .settings-panel h3, body.theme-light .settings-panel .theme-toggle label {
            color: #333;
        }
        body.theme-light .switch {
            background: #ccc;
        }
        body.theme-light .settings-panel .currency-group, body.theme-light .settings-panel .commission-group {
            background: #f9f9f9;
            border-color: #ccc;
        }
        body.theme-light .settings-panel .currency-group h4, body.theme-light .settings-panel .commission-group h4 {
            color: #333;
        }
        body.theme-light .settings-panel .currency-group select, body.theme-light .settings-panel .commission-row input {
            background: #f9f9f9;
            color: #1a1a1a;
            border-color: #ccc;
        }
        .main-tabs {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem 1.5rem;
            background: transparent;
        }
        .main-tabs button {
            background: transparent;
            border: none;
            color: #8d9bb5;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
        }
        .main-tabs button:hover {
            color: #e0e6ed;
            background: #161c27;
        }
        .main-tabs button.active {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
            background: #161c27;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .portfolio-section, .market-section, .history-section {
            background: #10161e;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #2a3442;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: background 0.3s, border-color 0.3s;
        }
        body.theme-light .portfolio-section, body.theme-light .market-section, body.theme-light .history-section {
            background: #ffffff;
            border-color: #ccc;
        }
        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .portfolio-header h2 {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: #f1c40f;
        }
        .portfolio-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            margin-bottom: 1.5rem;
            background: #0b0e14;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            flex-direction: column;
        }
        body.theme-light .portfolio-summary {
            background: #f9f9f9;
        }
        .portfolio-summary .item {
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
        }
        .portfolio-summary .item strong {
            color: #fff;
        }
        body.theme-light .portfolio-summary .item strong {
            color: #1a1a1a;
        }
        .portfolio-summary .item .green { color: #2ecc71; }
        .portfolio-summary .item .red { color: #e74c3c; }
        .btn-collect-dividends {
            background: #f39c12;
            color: #0b0e14;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            cursor: pointer;
            align-self: flex-start;
            margin-top: 0.2rem;
        }
        .btn-collect-dividends:hover {
            background: #e67e22;
        }
        .portfolio-table-wrap, .market-table-wrap, .history-table-wrap {
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .portfolio-table, .market-table, .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.8rem, 2.2vw, 0.9rem);
            min-width: 600px;
        }
        .portfolio-table th, .market-table th, .history-table th {
            text-align: left;
            padding: 0.6rem 0.5rem;
            background: #1a2230;
            color: #aab3c5;
            font-weight: 600;
            border-bottom: 2px solid #2a3442;
            cursor: pointer;
            user-select: none;
        }
        body.theme-light .portfolio-table th, body.theme-light .market-table th, body.theme-light .history-table th {
            background: #e9ecef;
            color: #333;
            border-bottom-color: #ccc;
        }
        .portfolio-table td, .market-table td, .history-table td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #1e2635;
        }
        body.theme-light .portfolio-table td, body.theme-light .market-table td, body.theme-light .history-table td {
            border-bottom-color: #ddd;
        }
        .portfolio-table .asset-row, .market-table .asset-row {
            cursor: pointer;
        }
        .portfolio-table .asset-row:hover, .market-table .asset-row:hover {
            background: #1a2230;
        }
        body.theme-light .portfolio-table .asset-row:hover, body.theme-light .market-table .asset-row:hover {
            background: #e9ecef;
        }
        .portfolio-table .detail-row, .market-table .detail-row {
            display: none;
        }
        .portfolio-table .detail-row.expanded, .market-table .detail-row.expanded {
            display: table-row;
        }
        .portfolio-table .detail-row td, .market-table .detail-row td {
            padding: 0.8rem 1rem;
            background: #0b0e14;
            border-bottom: 1px solid #2a3442;
        }
        body.theme-light .portfolio-table .detail-row td, body.theme-light .market-table .detail-row td {
            background: #f9f9f9;
            border-bottom-color: #ddd;
        }
        .detail-row .chart-container {
            width: 100%;
            height: 150px;
            background: #0b0e14;
            border-radius: 8px;
            margin-bottom: 0.8rem;
        }
        body.theme-light .detail-row .chart-container {
            background: #f9f9f9;
        }
        .detail-row .chart-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 8px;
        }
        .detail-row .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        .detail-row .controls input {
            flex: 1 1 80px;
            background: #0b0e14;
            border: 1px solid #2a3442;
            border-radius: 8px;
            padding: 0.4rem 0.3rem;
            color: #fff;
            font-size: 0.95rem;
            text-align: center;
            outline: none;
        }
        body.theme-light .detail-row .controls input {
            background: #f9f9f9;
            color: #1a1a1a;
            border-color: #ccc;
        }
        .detail-row .controls .total-cost {
            font-size: 0.85rem;
            color: #f1c40f;
            background: #1e2635;
            padding: 0.2rem 0.8rem;
            border-radius: 12px;
            white-space: nowrap;
        }
        body.theme-light .detail-row .controls .total-cost {
            background: #e9ecef;
            color: #333;
        }
        .detail-row .controls .btn-max {
            background: #f39c12;
            color: #0b0e14;
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .detail-row .controls button {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn-buy { background: #2ecc71; color: #0b0e14; }
        .btn-buy:hover { background: #27ae60; }
        .btn-sell { background: #e74c3c; color: #fff; }
        .btn-sell:hover { background: #c0392b; }
        .capital-breakdown {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 2.5rem;
            padding-top: 0.8rem;
            border-top: 1px solid #2a3442;
            margin-top: 0.5rem;
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
        }
        body.theme-light .capital-breakdown { border-top-color: #ccc; }
        .capital-breakdown .label { color: #aab3c5; }
        body.theme-light .capital-breakdown .label { color: #666; }
        .capital-breakdown .value { font-weight: 700; color: #fff; }
        body.theme-light .capital-breakdown .value { color: #1a1a1a; }
        .tabs {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tabs button {
            background: #1e2635;
            border: none;
            color: #aab3c5;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 600;
            cursor: pointer;
        }
        body.theme-light .tabs button { background: #e9ecef; color: #333; }
        .tabs button.active { background: #f1c40f; color: #0b0e14; }
        .market-searches {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-bottom: 1rem;
        }
        .market-searches .search-group {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex: 1 1 200px;
        }
        .market-searches .search-group input {
            flex: 1;
            background: #0b0e14;
            border: 1px solid #2a3442;
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            color: #e0e6ed;
            outline: none;
        }
        body.theme-light .market-searches .search-group input { background: #f9f9f9; color: #1a1a1a; border-color: #ccc; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1a2230;
            border-radius: 24px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            border: 1px solid #f1c40f;
            text-align: center;
        }
        body.theme-light .modal-box { background: #fff; border-color: #ccc; }
        .info-icon { cursor: pointer; color: #f1c40f; font-weight: bold; margin-right: 6px; }
        body.theme-light .info-icon { color: #333; }
        .empty-msg { text-align: center; padding: 2rem; color: #5a6a82; }
    </style>
</head>
<body>
<div id="app">
    <div id="stickyHeader">
        <header class="header">
            <div class="header-left">
                <h1 id="gameTitle">Mi Cartera</h1>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span>💰 Efectivo: <strong id="cashDisplay">0</strong></span>
                    <span class="net-worth">🏆 Patrimonio: <strong id="netWorthDisplay">0</strong></span>
                </div>
                <span class="news-status" id="newsStatus">🔴 Noticia</span>
                <button class="settings-btn" id="settingsToggle">⚙️</button>
            </div>
        </header>
        <div class="main-tabs">
            <button class="active" data-section="portfolio">📋 Mi Cartera</button>
            <button data-section="market">📈 Mercado</button>
            <button data-section="credit">💳 Crédito</button>
            <button data-section="business">🏢 Negocios</button>
            <button data-section="history">📜 Historial</button>
        </div>
    </div>

    <section id="portfolioSection" class="section active">
        <div class="portfolio-section">
            <div class="portfolio-header">
                <h2>📋 Resumen de Cartera</h2>
            </div>
            <div class="portfolio-summary" id="portfolioSummary"></div>
            <div id="portfolioTables"></div>
            <div class="capital-breakdown" id="capitalBreakdown"></div>
        </div>
    </section>

    <section id="marketSection" class="section">
        <div class="market-section">
            <h2>📈 Mercado</h2>
            <div class="tabs" id="marketTabs">
                <button class="active" data-filter="stock">📊 Acciones</button>
                <button data-filter="crypto">🪙 Spot</button>
            </div>
            <div class="market-searches">
                <div class="search-group">
                    <input type="text" id="searchMarket" placeholder="Buscar activo...">
                </div>
            </div>
            <div class="market-table-wrap">
                <table class="market-table">
                    <tbody id="marketBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="creditSection" class="section">
        <div class="portfolio-section"><h2>💳 Crédito</h2></div>
    </section>

    <section id="businessSection" class="section">
        <div class="portfolio-section"><h2>🏢 Negocios</h2></div>
    </section>

    <section id="historySection" class="section">
        <div class="history-section"><h2>📜 Historial</h2></div>
    </section>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Atención</div>
        <div class="modal-message" id="modalMessage">Mensaje</div>
        <button class="btn-buy" id="modalBtn" style="padding:0.5rem 1.5rem; margin-top:1rem; border-radius:20px; border:none; cursor:pointer;">Entendido</button>
    </div>
</div>

<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <h3>⚙️ Configuración</h3>
    <div class="theme-toggle">
        <label>🌙 Oscuro</label>
        <div class="switch" id="themeSwitch"><div class="slider"></div></div>
        <label>☀️ Claro</label>
    </div>
    <div class="currency-group">
        <h4>💱 Moneda</h4>
        <select id="currencySelect"></select>
    </div>
    <button class="close-settings" id="closeSettings">Cerrar</button>
</div>

<script>
    (function() {
        "use strict";

        const CURRENCIES = {
            'VES': { symbol: 'Bs', label: 'Bolívar (VES)' },
            'USD': { symbol: '$', label: 'Dólar (USD)' },
            'EUR': { symbol: '€', label: 'Euro (EUR)' }
        };

        let state = {
            cash: 1000,
            assets: [
                { id: 'btc', name: 'Bitcoin', symbol: 'BTC', type: 'crypto', price: 60000, owned: 0.1, costBasis: 5500, history: [59000, 60000] },
                { id: 'aapl', name: 'Apple', symbol: 'AAPL', type: 'stock', price: 180, owned: 5, costBasis: 850, history: [175, 180], exchange: 'NASDAQ' }
            ],
            currency: 'USD',
            transactions: [],
            notifications: []
        };

        function formatNumber(num, decimals = 2, showSymbol = true) {
            if (isNaN(num)) return '0,00';
            const formatted = new Intl.NumberFormat('es-ES', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(num);
            return showSymbol ? formatted + ' ' + (CURRENCIES[state.currency]?.symbol || '$') : formatted;
        }

        function renderPortfolio() {
            const summary = document.getElementById('portfolioSummary');
            summary.innerHTML = `<div class="item">💵 Efectivo: <strong>${formatNumber(state.cash)}</strong></div>`;

            const container = document.getElementById('portfolioTables');
            let html = '<table class="portfolio-table"><thead><tr><th>Activo</th><th>Cantidad</th><th>Valor Actual</th></tr></thead><tbody>';
            state.assets.forEach(a => {
                if (a.owned > 0) {
                    html += `<tr><td>${a.name}</td><td>${a.owned}</td><td>${formatNumber(a.price * a.owned)}</td></tr>`;
                }
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderAll() {
            renderPortfolio();
        }

        document.getElementById('settingsToggle').addEventListener('click', () => {
            document.getElementById('settingsPanel').classList.add('active');
            document.getElementById('settingsOverlay').classList.add('active');
        });
        document.getElementById('closeSettings').addEventListener('click', () => {
            document.getElementById('settingsPanel').classList.remove('active');
            document.getElementById('settingsOverlay').classList.remove('active');
        });

        document.querySelectorAll('.main-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.main-tabs button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.section + 'Section';
                document.getElementById(target).classList.add('active');
            });
        });

        renderAll();
    })();
</script>
</body>
</html>
