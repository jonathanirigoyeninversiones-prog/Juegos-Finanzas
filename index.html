<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Finanzas</title>
</head>
<body>

    <h1>Bienvenido al Juego</h1>
    <button id="botonGuardar">Guardar Partida de Prueba</button>

    <script type="module">
        // 1. Importamos las herramientas de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // 2. Tu configuración personalizada
        const firebaseConfig = {
            apiKey: "AIzaSyAlbKvvEH2ad0iKKyFAqP8tzqKzPIe1qFk",
            authDomain: "juego-financiero.firebaseapp.com",
            projectId: "juego-financiero",
            storageBucket: "juego-financiero.firebasestorage.app",
            messagingSenderId: "1016511710595",
            appId: "1:1016511710595:web:af94f7572539832e2fa2b6",
            measurementId: "G-87BNF546QY"
        };

        // 3. Inicializamos la conexión
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. Preparamos la función para guardar datos
        const boton = document.getElementById("botonGuardar");
        boton.addEventListener("click", async () => {
            try {
                await addDoc(collection(db, "partidas"), {
                    jugador: "Jonathan",
                    dinero: 1000,
                    fecha: new Date()
                });
                alert("¡Datos guardados en Firebase!");
            } catch (e) {
                console.error("Error al guardar: ", e);
                alert("Hubo un error, revisa la consola.");
            }
        });
    </script>

</body>
</html>
