
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVC · Provincial · Volumen + RSI Amarillo</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #131722;
            color: #d1d4dc;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.5rem;
            position: relative;
        }
        /* Botón de Cerrar */
        #btn-cerrar {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e91e63;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10000;
            transition: background 0.3s;
        }
        #btn-cerrar:hover {
            background: #c2185b;
        }
        #tv_chart {
            height: 660px;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0,0,0,0.7);
            background: #1e222d;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <button id="btn-cerrar" onclick="window.close()">Cerrar</button>
    <div id="tv_chart"></div>

    <script>
        (function() {
            new TradingView.widget({
                "container_id": "tv_chart",
                // 🟢 CAMBIO #1: Símbolo CORRECTO para la Bolsa de Caracas
                "symbol": "BVCV:BPV",  
                "interval": "D",
                "theme": "dark",
                "timezone": "America/Caracas",
                "locale": "es",
                "autosize": true,
                "allow_symbol_change": true,
                "show_popup_button": true,
                "hide_side_toolbar": false,
                "save_image": false,
                "details": true,
                "hotlist": false,
                "calendar": false,
                "news": [],

                // 🟢 CAMBIO #2: SOLO Volumen (arriba) y RSI Amarillo (abajo)
                // He eliminado los 13 indicadores pesados para que cargue RÁPIDO
                "studies": [
                    // 1️⃣ Volumen – panel superior
                    {
                        "name": "Volume@tv-basicstudies",
                        "position": "top"
                    },
                    // 2️⃣ RSI – panel inferior, amarillo y editable
                    {
                        "name": "RSI@tv-basicstudies",
                        "inputs": { "length": 14 },
                        "styles": {
                            "RSI": {
                                "color": "#F0B90B",  // Amarillo
                                "linestyle": 0,
                                "linewidth": 2
                            },
                            "RSI_upper_line": {
                                "color": "#4c525e",
                                "linestyle": 1,
                                "linewidth": 1
                            },
                            "RSI_middle_line": {
                                "color": "#4c525e",
                                "linestyle": 1,
                                "linewidth": 1
                            },
                            "RSI_lower_line": {
                                "color": "#4c525e",
                                "linestyle": 1,
                                "linewidth": 1
                            }
                        },
                        "editable": true,
                        "position": "bottom"
                    }
                ]
            });
        })();
    </script>
</body>
</html>
