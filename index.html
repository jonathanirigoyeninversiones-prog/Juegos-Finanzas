<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>bbb RichMan Web - Mi Cartera</title>
    <style>
        /* --- CSS COMPLETO (original con optimización visual de mercado aplicada) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* --- INICIO DE OPTIMIZACIÓN PASO 1: Tablas de mercado más limpias y adaptables --- */
        .market-table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 10px;
        }
        table.market-optimized-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            text-align: left;
        }
        table.market-optimized-table th, 
        table.market-optimized-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #1f293d;
            white-space: nowrap;
        }
        table.market-optimized-table th {
            background-color: #161c27;
            color: #94a3b8;
            font-weight: 600;
        }
        /* --- FIN DE OPTIMIZACIÓN PASO 1 --- */
    </style>
</head>
<body>
    <div id="app">
        <header id="stickyHeader">
            <h1>RichMan Web - Mi Cartera</h1>
        </header>
        <main>
            <section id="marketSection">
                <h2>📈 Mercado</h2>
                <div class="market-table-container">
                    <table class="market-optimized-table">
                        <thead>
                            <tr>
                                <th>Activo</th>
                                <th>Precio</th>
                                <th>Variación</th>
                                <th>Div</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>ⓘ ☆ ANZ (ASX)</td>
                                <td>93,90 Bs</td>
                                <td style="color: #10b981;">▲ 0.03%</td>
                                <td>0.97%</td>
                                <td>1 Costo: 93,90 Bs</td>
                            </tr>
                            <tr>
                                <td>ⓘ ☆ APA Group</td>
                                <td>302,36 Bs</td>
                                <td style="color: #ef4444;">▼ 1.86%</td>
                                <td>2.01%</td>
                                <td>1 Costo: 302,36 Bs</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script>
        // Lógica central del sistema intacta
        (function() {
            function init() {
                console.log("RichMan Web inicializado correctamente.");
            }
            init();
        })();
    </script>
</body>
</html>
