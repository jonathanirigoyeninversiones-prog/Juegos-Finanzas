<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>RichMan Web - Mi Cartera</title>
    <style>
        /* --- CSS COMPLETO (original con añadidos para préstamos) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        #app {
            max-width: 1300px;
            width: 100%;
        }
        #stickyHeader {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(22, 28, 39, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #2a3442;
            border-radius: 16px 16px 0 0;
            margin-bottom: 1.5rem;
            transition: background 0.3s, border-color 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        body.theme-light #stickyHeader {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: #ccc;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            background: transparent;
            padding: 1.5rem;
            border-radius: 16px 16px 0 0;
            margin-bottom: 0;
            border: none;
            box-shadow: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            transition: background 0.3s, border-color 0.3s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(135deg, #f5b041, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            border: none;
            outline: none;
            padding: 0 5px;
        }
        .header-left .game-title-input {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            background: transparent;
            border: 1px dashed #4a5a72;
            color: #f1c40f;
            padding: 4px 10px;
            border-radius: 8px;
            outline: none;
            width: auto;
            min-width: 150px;
            font-family: inherit;
        }
        .header-left .game-title-input:focus {
            border-color: #f1c40f;
            background: #1e2635;
            color: #fff;
        }
        .header-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 1rem;
        }
        .stats span {
            background: #232d3d;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border-left: 3px solid #f1c40f;
            white-space: nowrap;
            font-size: clamp(0.75rem, 2vw, 1rem);
            transition: background 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .stats .net-worth {
            border-left-color: #2ecc71;
            font-weight: bold;
        }
        .news-status {
            color: #fff;
            font-style: italic;
            background: #e74c3c;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #e74c3c;
            display: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .news-status:hover {
            transform: scale(1.05);
            background: #c0392b;
        }
        .settings-btn {
            background: transparent;
            border: none;
            color: #e0e6ed;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 0.5rem;
            transition: transform 0.3s, color 0.3s;
            line-height: 1;
        }
        .settings-btn:hover {
            transform: rotate(60deg);
            color: #f1c40f;
        }
        /* --- Resto del CSS (idéntico al original, con añadidos de estilo) --- */
        .settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a2230;
            border: 1px solid #f1c40f;
            border-radius: 20px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            z-index: 10000;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            transition: background 0.3s, border-color 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-panel h3 {
            color: #f1c40f;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .settings-panel .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.1rem;
            color: #aab3c5;
            margin-bottom: 1.5rem;
        }
        .settings-panel .theme-toggle label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #e0e6ed;
        }
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #2a3442;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .switch .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            background: #f1c40f;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .switch.active .slider {
            transform: translateX(24px);
        }
        .switch.active {
            background: #f1c40f;
        }
        .settings-panel .currency-group {
            margin: 1rem 0;
            padding: 0.8rem;
            background: #0b0e14;
            border-radius: 12px;
            border: 1px solid #2a3442;
        }
        .settings-panel .currency-group h4 {
            color: #f1c40f;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            text-align: center;
        }
        .settings-panel .currency-group select {
            width: 140px;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #2a3442;
            background: #0b0e14;
            color: #e0e6ed;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .settings-panel .currency-group select:focus {
            border-color: #f1c40f;
        }
        .settings-panel .currency-group .format-hint {
            font-size: 0.8rem;
            color: #8d9bb5;
        }
        body.theme-light .settings-panel .currency-group {
            background: #f9f9f9;
            border-color: #ccc;
        }
        body.theme-light .settings-panel .currency-group h4 {
            color: #333;
        }
        body.theme-light .settings-panel .currency-group select {
            background: #f9f9f9;
            color: #1a1a1a;
            border-color: #ccc;
        }
        body.theme-light .settings-panel .currency-group .format-hint {
            color: #666;
        }
        .settings-panel .commission-group {
            margin: 1rem 0;
            padding: 0.8rem;
            background: #0b0e14;
            border-radius: 12px;
            border: 1px solid #2a3442;
        }
        .settings-panel .commission-group h4 {
            color: #f1c40f;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            text-align: center;
        }
        .settings-panel .commission-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }
        .settings-panel .commission-row label {
            font-size: 0.9rem;
            color: #aab3c5;
            min-width: 70px;
        }
        .settings-panel .commission-row input {
            width: 80px;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            border: 1px solid #2a3442;
            background: #0b0e14;
            color: #e0e6ed;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .settings-panel .commission-row input:focus {
            border-color: #f1c40f;
        }
        .settings-panel .commission-row span {
            font-size: 0.8rem;
            color: #8d9bb5;
            min-width: 20px;
        }
        .settings-panel .close-settings {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 0.4rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: background 0.2s;
        }
        .settings-panel .close-settings:hover {
            background: #c0392b;
        }
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            z-index: 9999;
        }
        .settings-overlay.active {
            display: block;
        }
        /* Tema claro */
        body.theme-light {
            background: #f0f2f5;
            color: #1a1a1a;
        }
        body.theme-light #stickyHeader {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: #ccc;
        }
        body.theme-light .header {
            background: transparent;
        }
        body.theme-light .stats span {
            background: #e9ecef;
            color: #1a1a1a;
        }
        body.theme-light .stats .net-worth {
            border-left-color: #2ecc71;
        }
        body.theme-light .news-status {
            border-color: #e74c3c;
        }
        body.theme-light .news-status:hover {
            background: #c0392b;
        }
        body.theme-light .settings-btn {
            color: #333;
        }
        body.theme-light .settings-btn:hover {
            color: #f1c40f;
        }
        body.theme-light .settings-panel {
            background: #ffffff;

        }
        body.theme-light .settings-panel .theme-toggle label {
            color: #333;
        }
        body.theme-light .settings-panel h3 {
            color: #333;
        }
        body.theme-light .switch {
            background: #ccc;
        }
        body.theme-light .switch.active {
            background: #f1c40f;
        }
        body.theme-light .settings-panel .commission-group {
            background: #f9f9f9;
            border-color: #ccc;
        }
        body.theme-light .settings-panel .commission-group h4 {
            color: #333;
        }
        body.theme-light .settings-panel .commission-row label {
            color: #555;
        }
        body.theme-light .settings-panel .commission-row input {
            background: #f9f9f9;

        }
        body.theme-light .settings-panel .commission-row input:focus {
            border-color: #f1c40f;
        }
        body.theme-light .settings-panel .commission-row span {
            color: #666;
        }
        body.theme-light .portfolio-section {
            background: #ffffff;
            border-color: #ccc;
        }
        body.theme-light .portfolio-table th {
            background: #e9ecef;
            color: #333;
        }
        body.theme-light .portfolio-table td {
            border-bottom-color: #ddd;
        }
        body.theme-light .portfolio-table .type-header td {
            background: #e9ecef;
            color: #333;
        }
        body.theme-light .portfolio-summary {
            background: #f9f9f9;
        }
        body.theme-light .capital-breakdown {
            border-top-color: #ccc;
        }
        body.theme-light .market-section h2 {
            color: #333;
        }
        body.theme-light .market-table th {
            background: #e9ecef;

        }
        body.theme-light .market-table td {
            border-bottom-color: #ddd;
        }
        body.theme-light .history-section {
            background: #ffffff;
            border-color: #ccc;
        }
        body.theme-light .history-table th {
            background: #e9ecef;

        }
        body.theme-light .history-table td {
            border-bottom-color: #ddd;
        }
        body.theme-light .detail-row .chart-container {
            background: #f9f9f9;
        }
        body.theme-light .detail-row .controls input {
            background: #f9f9f9;
            color: #1a1a1a;
            border-color: #ccc;
        }
        body.theme-light .detail-row .controls .total-cost {
            background: #e9ecef;
            color: #333;
        }
        body.theme-light .empty-msg {
            color: #666;
        }
        body.theme-light .modal-box {
            background: #ffffff;
            border-color: #ccc;
        }
        body.theme-light .modal-box .modal-title {
            color: #333;
        }
        body.theme-light .modal-box .modal-message {
            color: #333;
        }
        body.theme-light .modal-box .modal-btn {
            background: #f1c40f;
            color: #0b0e14;
        }
        body.theme-light .main-tabs {
            border-bottom-color: #ccc;
        }
        body.theme-light .main-tabs button:hover {
            color: #333;
            background: #e9ecef;
        }
        body.theme-light .main-tabs button.active {
            background: #e9ecef;
            color: #f1c40f;
        }
        body.theme-light .portfolio-table .asset-row:hover {
            background: #e9ecef;
        }
        body.theme-light .portfolio-table .detail-row td {
            background: #f9f9f9;
            border-bottom-color: #ddd;
        }
        body.theme-light .detail-row .chart-container {
            background: #f9f9f9;
        }
        body.theme-light .market-table .asset-row:hover {
            background: #e9ecef;
        }
        body.theme-light .market-table .detail-row td {
            background: #f9f9f9;
            border-bottom-color: #ddd;
        }
        body.theme-light .market-table th {
            background: #e9ecef;

        body.theme-light .market-table th:hover {

        }
        body.theme-light .tabs button {
            background: #e9ecef;

        }
        body.theme-light .tabs button:hover {
            background: #d1d5db;
            color: #1a1a1a;
        }
        body.theme-light .market-searches .search-group label {
            color: #666;
        }
        body.theme-light .market-searches .search-group input {
            background: #f9f9f9;
            color: #1a1a1a;
            border-color: #ccc;
        }
        body.theme-light .market-searches .search-group input::placeholder {
            color: #999;
        }
        body.theme-light .capital-breakdown .label {
            color: #666;
        }
        body.theme-light .capital-breakdown .value {
            color: #1a1a1a;
        }
        body.theme-light .history-table th {
            background: #e9ecef;
            color: #333;
            border-bottom-color: #ccc;
        }
        body.theme-light .history-table td {
            border-bottom-color: #ddd;
        }
        body.theme-light .total-comisiones {

            color: #333;
        }
        .main-tabs {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem 1.5rem 0.5rem 1.5rem;
            border-bottom: none;
            transition: border-color 0.3s;
            background: transparent;
        }
        .main-tabs button {
            background: transparent;
            border: none;
            color: #8d9bb5;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            border-radius: 30px 30px 0 0;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
        }
        .main-tabs button:hover {
            color: #e0e6ed;
            background: #161c27;
        }
        .main-tabs button.active {
            color: #f1c40f;
            border-bottom-color: #f1c40f;
            background: #161c27;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .portfolio-section {
            background: #10161e;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #2a3442;
            transition: background 0.3s, border-color 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .portfolio-header h2 {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: #f1c40f;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0;
        }
        .news-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .portfolio-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            margin-bottom: 1.5rem;
            background: #0b0e14;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            flex-direction: column;
            transition: background 0.3s;
        }
        body.theme-light .portfolio-summary {
            background: #f9f9f9;
        }
        .portfolio-summary .item {

        .portfolio-summary .item strong {

        }
        .portfolio-summary .item .green { color: #2ecc71; }
        .portfolio-summary .item .red { color: #e74c3c; }
        .btn-collect-dividends {
